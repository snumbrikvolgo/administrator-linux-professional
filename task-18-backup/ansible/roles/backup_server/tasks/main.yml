---
- name: Ensure borg group exists
  ansible.builtin.group:
    name: borg
    state: present

- name: Ensure borg user exists
  ansible.builtin.user:
    name: borg
    group: borg
    shell: /bin/bash
    create_home: true
    state: present

- name: Check for backup disk partition
  ansible.builtin.stat:
    path: "{{ backup_disk_device }}1"
  register: backup_disk_partition

- name: Create GPT label on backup disk when partition is absent
  ansible.builtin.command: "parted -s {{ backup_disk_device }} mklabel gpt"
  when: not backup_disk_partition.stat.exists

- name: Create primary partition for backup storage
  ansible.builtin.command: "parted -s {{ backup_disk_device }} mkpart primary ext4 1MiB 100%"
  when: not backup_disk_partition.stat.exists

- name: Check current filesystem type on backup partition
  ansible.builtin.command: "blkid -o value -s TYPE {{ backup_disk_device }}1"
  register: backup_partition_fs
  changed_when: false
  failed_when: false

- name: Create ext4 filesystem on backup partition
  ansible.builtin.command: "mkfs.ext4 -F {{ backup_disk_device }}1"
  when: backup_partition_fs.stdout != "ext4"

- name: Ensure backup mount point exists
  ansible.builtin.file:
    path: "{{ backup_repo_path }}"
    state: directory
    mode: "0755"

- name: Get UUID of backup partition
  ansible.builtin.command: "blkid -o value -s UUID {{ backup_disk_device }}1"
  register: backup_partition_uuid
  changed_when: false

- name: Ensure backup partition is present in /etc/fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: "^UUID={{ backup_partition_uuid.stdout | regex_escape() }}\\s+{{ backup_repo_path | regex_escape() }}\\s"
    line: "UUID={{ backup_partition_uuid.stdout }} {{ backup_repo_path }} ext4 defaults 0 0"
    state: present

- name: Check whether backup repository path is already mounted
  ansible.builtin.command: "mountpoint -q {{ backup_repo_path }}"
  register: backup_mountpoint
  changed_when: false
  failed_when: false

- name: Mount backup repository path
  ansible.builtin.command: "mount {{ backup_repo_path }}"
  when: backup_mountpoint.rc != 0

- name: Ensure backup repository directory ownership
  ansible.builtin.file:
    path: "{{ backup_repo_path }}"
    state: directory
    owner: borg
    group: borg
    mode: "0755"

- name: Ensure borg repository directory exists
  ansible.builtin.file:
    path: "{{ backup_repo_dir }}"
    state: directory
    owner: borg
    group: borg
    mode: "0755"

- name: Ensure borg SSH directory exists
  ansible.builtin.file:
    path: /home/borg/.ssh
    state: directory
    owner: borg
    group: borg
    mode: "0700"

- name: Ensure borg authorized_keys file exists
  ansible.builtin.file:
    path: /home/borg/.ssh/authorized_keys
    state: touch
    owner: borg
    group: borg
    mode: "0600"
    access_time: preserve
    modification_time: preserve
